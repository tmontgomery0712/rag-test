# ===============================
# COMMON CONFIGURATION
# ===============================
spring.application.name=rag-ai-test

# Default to dev profile (override on Pi with SPRING_PROFILES_ACTIVE=prod)
spring.profiles.active=dev

# Context path for API endpoints
server.servlet.context-path=/api

# Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# ===============================
# JAVA 21 VIRTUAL THREADS
# ===============================
spring.threads.virtual.enabled=true

# ===============================
# SQLITE DATABASE (Common)
# ===============================
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# SQLite performance tweaks
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# JWT (Common)
# ===============================
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.jwt.refresh-cookie-name=refresh_token

# ===============================
# LOGGING (Common defaults)
# ===============================
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework.web=INFO
