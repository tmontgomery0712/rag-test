# ===============================
# DEV PROFILE (Local Development)
# ===============================

# HTTP on port 8080 (no SSL)
server.port=8080

# Local SQLite file in project directory
spring.datasource.url=jdbc:sqlite:./streaks.db?journal_mode=DELETE&busy_timeout=30000&synchronous=NORMAL

# Dev JWT secret (NOT for production)
app.jwt.secret=dev-local-secret-key-for-testing-only-minimum-256-bits-required-here
app.jwt.secure=false

# Verbose logging for debugging
logging.level.com.example.ragaitest=DEBUG

# Disable caching for dev (see changes immediately)
spring.web.resources.cache.period=0
