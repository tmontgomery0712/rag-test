# ===============================
# PROD PROFILE (Raspberry Pi)
# ===============================

# HTTPS on port 443
server.port=443

# Tailscale SSL certificates
# Set TAILSCALE_HOSTNAME in your .streaks.env file
server.ssl.certificate=/var/lib/tailscale/certs/${TAILSCALE_HOSTNAME}/cert.pem
server.ssl.certificate-private-key=/var/lib/tailscale/certs/${TAILSCALE_HOSTNAME}/key.pem

# SQLite on USB drive
spring.datasource.url=jdbc:sqlite:/mnt/usb-db/streaks.db?journal_mode=DELETE&busy_timeout=30000&synchronous=NORMAL

# JWT secret from environment variable
# Set JWT_SECRET in your .streaks.env file
app.jwt.secret=${JWT_SECRET}
app.jwt.secure=true

# Less verbose logging
logging.level.com.example.ragaitest=INFO

# Cache static resources for 1 hour
spring.web.resources.cache.period=3600
