name: Build and Deploy to Pi 3
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -f backend/pom.xml -DskipTests

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Copy JAR to Pi
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PI_TAILSCALE_IP }}
          username: tmontgomery
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/target/rag-ai-test-0.0.1-SNAPSHOT.jar"
          target: "/home/tmontgomery/"
          strip_components: 2

      - name: Rename JAR and Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_TAILSCALE_IP }}
          username: tmontgomery
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Rename JAR to expected name
            mv /home/tmontgomery/rag-ai-test-0.0.1-SNAPSHOT.jar /home/tmontgomery/streaks.jar
            
            # Reload and restart service
            sudo systemctl daemon-reload
            sudo systemctl restart streaks.service
            
            # Wait and check status
            sleep 5
            sudo systemctl status streaks.service --no-pager
            
            # Show recent logs
            echo ""
            echo "=== Recent logs ==="
            journalctl -u streaks.service -n 20 --no-pager
